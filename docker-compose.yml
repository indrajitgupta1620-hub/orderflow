version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: orderflow-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-orderflow_db}
      MYSQL_USER: ${MYSQL_USER:-orderflow_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      interval: 10s

  app:
    build: .
    image: ghcr.io/indrajitgupta1620-hub/orderflow:latest
    container_name: orderflow-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-orderflow_db}?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-orderflow_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data:
